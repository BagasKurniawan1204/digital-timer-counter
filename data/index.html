<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Web Server Configurator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
  <h1>Web Server Configurator</h1>

  <h2>
    <span class="sensor-labels">High Speed Channel Counts</span>
  </h2>

  <p>
    <button class="button" id="btn-counter-enable">Enable</button>
    <button class="button button2" id="btn-counter-disable">Disable</button>
    <button class="button" id="btn-counter-reset">Reset</button>
  </p>
  <p>Status: <span id="counter-status">Disabled</span></p>

  <p>
    <span class="sensor-labels">Counting:</span>
    <span id="counter">%HSC_COUNT_VALUE%</span>
    
    
  </p>

  <p>
  <span class="sensor-labels">Direction:</span>
  <span id="direction">-</span>
  </p>
  
  <p>
    <span class="sensor-labels">Frequency:</span>
    <span id="frequency">%HSC_FREQUENCY%</span>
  </p>

  <h2>
    <span class="sensor-labels">Stopwatch Timer</span>
  </h2>
  <p>
    <button class="button" id="btn-timer-enable">Enable</button>
    <button class="button button2" id="btn-timer-disable">Disable</button>
    <button class="button" id="btn-timer-reset">Reset</button>
  </p>
  <p>Status: <span id="timer-status">Disabled</span></p>
  <p>
      <span class="sensor-labels">Elapsed:</span>
      <span id="timer-val">0</span> ms
  </p>

  <!-- Scripts placed at end so DOM elements exist -->
  <script>
  // --- WebSocket setup ---
  const socket = new WebSocket("ws://" + window.location.host + "/ws");

  socket.addEventListener('open', () => console.log("ws opened"));
  socket.addEventListener('close', () => console.log("ws closed"));
  socket.addEventListener('error', (e) => console.error("ws err", e));
  
  socket.addEventListener('message', (evt) => {
  try {
    const data = JSON.parse(evt.data);
    const cntEl = document.getElementById("counter");
    const freqEl = document.getElementById("frequency");
    const dirEl = document.getElementById("direction");
    const timerEl = document.getElementById("timer-val");
    const cStatusEl = document.getElementById("counter-status");
    const tStatusEl = document.getElementById("timer-status");

    if (cntEl && data.count !== undefined) cntEl.textContent = data.count;
    if (freqEl && data.freq !== undefined) freqEl.textContent = data.freq;
    if (dirEl && data.dir !== undefined) dirEl.textContent = data.dir; // CW / CCW / STOP
    if (timerEl && data.timer !== undefined) timerEl.textContent = data.timer;
    
    if (cStatusEl && data.c_en !== undefined) {
        cStatusEl.textContent = data.c_en ? "Enabled" : "Disabled";
        cStatusEl.style.color = data.c_en ? "green" : "red";
    }
    if (tStatusEl && data.t_en !== undefined) {
        tStatusEl.textContent = data.t_en ? "Enabled" : "Disabled";
        tStatusEl.style.color = data.t_en ? "green" : "red";
    }

  } catch(e) {
    console.warn("ws: can't parse", evt.data);
  }
});

  // --- Toggle function used by buttons ---
  async function doToggle(path) {
    try {
      const res = await fetch(path, { cache: "no-store" });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const j = await res.json(); 

      console.log('Toggled, server returned', j);
    } catch (e) {
      console.error('toggle failed', e);
    }
  }

  // --- Attach event listeners to buttons ---
  document.getElementById('btn-counter-enable').addEventListener('click', (e) => {
    e.preventDefault();
    doToggle('/counter/enable');
  });
  document.getElementById('btn-counter-disable').addEventListener('click', (e) => {
    e.preventDefault();
    doToggle('/counter/disable');
  });
  document.getElementById('btn-counter-reset').addEventListener('click', (e) => {
    e.preventDefault();
    doToggle('/counter/reset');
  });

  document.getElementById('btn-timer-enable').addEventListener('click', (e) => {
    e.preventDefault();
    doToggle('/timer/enable');
  });
  document.getElementById('btn-timer-disable').addEventListener('click', (e) => {
    e.preventDefault();
    doToggle('/timer/disable');
  });
  document.getElementById('btn-timer-reset').addEventListener('click', (e) => {
    e.preventDefault();
    doToggle('/timer/reset');
  });

  </script>
</body>
</html>
